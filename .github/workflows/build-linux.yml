name: Build Linux

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - run: dotnet restore VitaDB.sln

      - run: dotnet publish VitaDB.csproj \
          -c Release \
          -r linux-x64 \
          --self-contained true \
          -p:PublishSingleFile=true \
          -o publish

      - name: Make executable
        run: chmod +x publish/VitaDB || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VitaDB-linux-x64
          path: publish/